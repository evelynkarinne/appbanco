<!DOCTYPE html>
<html>
<head>
    <title>Colaboradores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Colaboradores</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Cidade</th>
            <th>Salário</th>
            <th>Email</th>
        </tr>

        {% for c in colaboradores %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.nome }}</td>
            <td>{{ c.cidade }}</td>
            <td>R$ {{ c.salario }}</td>
            <td>{{ c.email }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
